# Usage:
#   podman-compose up -d
#
# `docker-compose.yml` is used for compatibility with podman-compose; the file
# is not docker-specific.

services:
  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: claims
      POSTGRES_USER: workshop
      POSTGRES_PASSWORD: workshop
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "workshop"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10

  claims-api:
    build:
      context: ..
      dockerfile: app/claims-api/Dockerfile
    environment:
      DATABASE_URL: postgres://workshop:workshop@postgres:5432/claims
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PORT: "8080"
      LOG_FILE: /logs/claims-api.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - app-logs:/logs:z

  claims-worker:
    build:
      context: ..
      dockerfile: app/claims-worker/Dockerfile
    environment:
      DATABASE_URL: postgres://workshop:workshop@postgres:5432/claims
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      PORT: "8081"
      LOG_FILE: /logs/claims-worker.log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - app-logs:/logs:z

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
      - app-logs:/logs:ro,z
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: docker.io/prom/prometheus:v2.55.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=2h
    ports:
      - "9090:9090"

  loki:
    image: docker.io/grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    ports:
      - "3100:3100"

  tempo:
    image: docker.io/grafana/tempo:2.6.0
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
    ports:
      - "3200:3200"

  grafana:
    image: docker.io/grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: workshop-grafana-admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Editor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki

volumes:
  pgdata:
  app-logs:
